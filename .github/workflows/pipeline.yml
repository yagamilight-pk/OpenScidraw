name: OpenSciDraw Asset Pipeline

on:
  push:
    branches:
      - main
      - master
    paths:
      - "vectors/raw/**"
      - "asset-pipeline/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: asset-pipeline-${{ github.ref }}
  cancel-in-progress: false

env:
  SKIP_PIPELINE: 'false'

jobs:
  process-and-commit:
    name: Process SVG Assets & Update Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect Triggering Actor (Loop Guard)
        id: loop_guard
        run: |
          echo "actor=${{ github.actor }}" >> $GITHUB_OUTPUT
          if [[ "${{ github.actor }}" == "github-actions[bot]" ]]; then
            echo "SKIP_PIPELINE=true" >> $GITHUB_ENV
          else
            echo "SKIP_PIPELINE=false" >> $GITHUB_ENV
          fi

      - name: Abort if Pipeline-Triggered Commit
        if: env.SKIP_PIPELINE == 'true'
        run: |
          echo "Skipping: commit originated from github-actions[bot] to prevent execution loops."
          exit 0

      - name: Set Up Python 3.12
        if: env.SKIP_PIPELINE == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache pip Dependencies
        if: env.SKIP_PIPELINE == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('asset-pipeline/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python Dependencies
        if: env.SKIP_PIPELINE == 'false'
        run: |
          python -m pip install --upgrade pip
          if [ -f asset-pipeline/requirements.txt ]; then
            pip install -r asset-pipeline/requirements.txt
          else
            echo "No requirements.txt found; continuing with stdlib only."
          fi

      - name: Validate Raw SVG Directory
        if: env.SKIP_PIPELINE == 'false'
        id: validate_raw
        run: |
          if [ -d "vectors/raw" ]; then
            SVG_COUNT=$(find vectors/raw -name "*.svg" | wc -l)
            echo "svg_count=$SVG_COUNT" >> $GITHUB_OUTPUT
            echo "Found $SVG_COUNT SVG file(s) in vectors/raw"
          else
            echo "svg_count=0" >> $GITHUB_OUTPUT
            echo "WARNING: vectors/raw directory does not exist. Continuing with empty manifest."
          fi

      - name: Run Primary Vector Optimization Pipeline
        if: env.SKIP_PIPELINE == 'false'
        id: run_pipeline
        run: |
          mkdir -p vectors/optimized data-feed
          python asset-pipeline/process_vectors.py 2>&1 | tee pipeline_output.log
          PIPELINE_EXIT=${PIPESTATUS[0]}
          echo "exit_code=$PIPELINE_EXIT" >> $GITHUB_OUTPUT
          if [ $PIPELINE_EXIT -ne 0 ]; then
            echo "::error::Pipeline script exited with code $PIPELINE_EXIT"
            cat pipeline_output.log
            exit $PIPELINE_EXIT
          fi

      - name: Validate Manifest Output
        if: env.SKIP_PIPELINE == 'false'
        run: |
          if [ ! -f "data-feed/manifest.json" ]; then
            echo "::error::manifest.json was not created by the pipeline."
            exit 1
          fi
          python -c "
          import json, sys
          with open('data-feed/manifest.json', 'r', encoding='utf-8') as f:
              m = json.load(f)
          required_keys = ['version', 'generatedAt', 'totalAssets', 'categories', 'assets']
          missing = [k for k in required_keys if k not in m]
          if missing:
              print(f'ERROR: manifest.json missing keys: {missing}', file=sys.stderr)
              sys.exit(1)
          print(f'Manifest OK: {m[\"totalAssets\"]} asset(s) indexed.')
          "

      - name: Check for Meaningful Diff
        if: env.SKIP_PIPELINE == 'false'
        id: diff_check
        run: |
          git add vectors/optimized/ data-feed/ public/vectors/optimized/ public/data-feed/ || true
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in pipeline outputs. Skipping commit."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            CHANGED=$(git diff --cached --name-only | wc -l)
            echo "Detected $CHANGED changed file(s)"
          fi

      - name: Configure Git Identity
        if: env.SKIP_PIPELINE == 'false' && steps.diff_check.outputs.has_changes == 'true'
        run: |
          git config user.name "OpenSciDraw Pipeline Bot"
          git config user.email "pipeline-bot@openscidraw.dev"

      - name: Commit Updated Assets & Manifest
        if: env.SKIP_PIPELINE == 'false' && steps.diff_check.outputs.has_changes == 'true'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SVG_COUNT=${{ steps.validate_raw.outputs.svg_count }}
          git commit -m "chore(pipeline): auto-update compiled assets [skip ci]

          Triggered by: ${{ github.actor }}
          Pipeline run: ${{ github.run_number }}
          SVGs processed: ${SVG_COUNT}
          Timestamp: ${TIMESTAMP}

          Co-authored-by: OpenSciDraw Pipeline Bot <pipeline-bot@openscidraw.dev>"

      - name: Push Changes to Repository
        if: env.SKIP_PIPELINE == 'false' && steps.diff_check.outputs.has_changes == 'true'
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          force: false

      - name: Upload Pipeline Log as Artifact
        if: always() && env.SKIP_PIPELINE == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_number }}
          path: pipeline_output.log
          retention-days: 14

      - name: Print Summary
        if: env.SKIP_PIPELINE == 'false'
        run: |
          echo "## OpenSciDraw Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggering Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Raw SVGs Found | ${{ steps.validate_raw.outputs.svg_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Changes Committed | ${{ steps.diff_check.outputs.has_changes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pipeline Exit Code | ${{ steps.run_pipeline.outputs.exit_code }} |" >> $GITHUB_STEP_SUMMARY
