<svg width="100" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- DNA Double Helix -->
  <!-- Rungs (horizontal connections) -->
  <line x1="30" y1="30" x2="70" y2="30" stroke="#f43f5e" stroke-width="3"/>
  <line x1="40" y1="60" x2="60" y2="60" stroke="#eab308" stroke-width="3"/>
  <line x1="50" y1="90" x2="50" y2="90" stroke="#10b981" stroke-width="3"/>
  <line x1="40" y1="120" x2="60" y2="120" stroke="#3b82f6" stroke-width="3"/>
  <line x1="30" y1="150" x2="70" y2="150" stroke="#f43f5e" stroke-width="3"/>
  <line x1="45" y1="180" x2="55" y2="180" stroke="#10b981" stroke-width="3"/>

  <!-- Helix Strand 1 -->
  <path d="M 30 10 C 50 10, 70 50, 70 90 C 70 130, 30 170, 30 210" fill="none" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <!-- Helix Strand 2 -->
  <path d="M 70 10 C 50 10, 30 50, 30 90 C 30 130, 70 170, 70 210" fill="none" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
</svg>
